spring:
  application:
    name: alpr
  datasource:
    url: jdbc:postgresql://localhost:5432/sentinela
    username: sentinela
    password: sentinela
  jpa:
    hibernate:
      ddl-auto: validate      # Flyway é a fonte da verdade do schema; Hibernate só valida
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
